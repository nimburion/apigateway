name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-rc*'

permissions:
  contents: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec Security Scanner
        run: gosec ./...

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Run Verification
    uses: ./.github/workflows/reusable-test.yml
    with:
      go-version: '1.25.10'
      node-version: '20'
      coverage-threshold: 50
    permissions:
      contents: read

  build:
    name: Build & Verify
    needs: [test, security, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: developer-portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci
        working-directory: developer-portal

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Generate embedded assets and schema
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Build stamped binary
        run: make build VERSION=${{ github.ref_name }}

      - name: Verify version output
        run: ./nimbgtw version | grep "${{ github.ref_name }}"

      - name: Validate example routes
        run: ./nimbgtw routes validate --config-file config/config.example.yaml

      - name: Generate OpenAPI from example config
        run: ./nimbgtw openapi generate --config-file config/config.example.yaml --output /tmp/nimbgtw-openapi.yml

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
